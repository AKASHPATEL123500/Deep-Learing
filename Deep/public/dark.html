<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Travel Card Dark</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    min-height: 100vh;
    background: #1e2128;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'DM Sans', sans-serif;
  }

  /* ── OUTER CARD ── dark raised neumorphic */
  .card {
    width: 310px;
    background: #1e2128;
    border-radius: 32px;
    padding: 14px;
    box-shadow:
      10px 10px 28px #13151a,
      -10px -10px 28px #292e38;
  }

  /* ── IMAGE BLOCK ── */
  .card-image {
    width: 100%;
    height: 195px;
    border-radius: 20px;
    overflow: hidden;
    position: relative;
    box-shadow:
      5px 5px 14px #13151a,
      -3px -3px 8px #292e38;
  }

  .card-image img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-image::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, transparent 30%, rgba(0,0,0,0.65) 100%);
    border-radius: 20px;
  }

  .image-text {
    position: absolute;
    bottom: 13px;
    left: 13px;
    z-index: 2;
    color: #fff;
  }

  .image-text h2 {
    font-size: 14.5px;
    font-weight: 600;
    letter-spacing: 0.1px;
    line-height: 1.3;
  }

  .image-text p {
    font-size: 10.5px;
    font-weight: 300;
    opacity: 0.75;
    margin-top: 1px;
  }

  .price-badge {
    position: absolute;
    bottom: 13px;
    right: 13px;
    z-index: 2;
    background: rgba(30,33,40,0.45);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    border: 1px solid rgba(255,255,255,0.12);
    color: #fff;
    font-size: 13px;
    font-weight: 600;
    padding: 5px 14px;
    border-radius: 50px;
  }

  /* ── INFO PANEL ── dark inset neumorphic */
  .info-panel {
    margin-top: 12px;
    background: #1e2128;
    border-radius: 20px;
    padding: 13px 14px;
    box-shadow:
      inset 5px 5px 12px #13151a,
      inset -5px -5px 12px #292e38;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .info-left { flex: 1; }

  .location-title {
    font-size: 13.5px;
    font-weight: 600;
    color: #dde1ea;
    margin-bottom: 1px;
  }

  .location-sub {
    font-size: 10px;
    color: #5a6070;
    font-weight: 400;
    margin-bottom: 11px;
  }

  .stats-row {
    display: flex;
    gap: 18px;
  }

  .stat-value {
    font-size: 12.5px;
    font-weight: 600;
    color: #c8cdd8;
    line-height: 1.2;
  }

  .stat-label {
    font-size: 9px;
    color: #4a5060;
    font-weight: 400;
    margin-top: 1px;
  }

  /* ── ARROW BUTTON ── dark raised neumorphic */
  .arrow-btn {
    width: 50px;
    height: 50px;
    border-radius: 50%;
    background: #1e2128;
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    box-shadow:
      5px 5px 12px #13151a,
      -5px -5px 12px #292e38;
    transition: box-shadow 0.15s ease;
  }

  .arrow-btn:active {
    box-shadow:
      inset 4px 4px 9px #13151a,
      inset -4px -4px 9px #292e38;
  }

  .arrow-btn svg {
    width: 18px;
    height: 18px;
    fill: #6b7585;
    margin-left: 2px;
  }
</style>
</head>
<body>

<div class="card">

  <div class="card-image">
    <img src="https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=700&q=80" alt="Horseshoe Ridge"/>
    <div class="image-text">
      <h2>Horseshoe Ridge</h2>
      <p>Mount Rainier Mountain</p>
    </div>
    <div class="price-badge">$720</div>
  </div>

  <div class="info-panel">
    <div class="info-left">
      <div class="location-title">Washington, USA</div>
      <div class="location-sub">southwest of Mount St. Helens</div>
      <div class="stats-row">
        <div class="stat">
          <div class="stat-value">29km</div>
          <div class="stat-label">Distance</div>
        </div>
        <div class="stat">
          <div class="stat-value">29Km</div>
          <div class="stat-label">Elevation</div>
        </div>
        <div class="stat">
          <div class="stat-value">7-9hr</div>
          <div class="stat-label">Duration</div>
        </div>
      </div>
    </div>

    <button class="arrow-btn">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M2 21L23 12 2 3v7l15 2-15 2z"/>
      </svg>
    </button>
  </div>

</div>
</body>
</html>
